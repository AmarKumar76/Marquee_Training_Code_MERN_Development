<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>animation</title>
    <style>
        body{
        height: 800px;
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        }
        .box{
            width: 100px;
            height: 100px;
            background-color: red;
            transition: all 4s ease;
            animation: abc 1s infinite ;
        }
        /*.box:hover{
            border-radius: 50%;*
            transform: rotate(45deg);
        }*/
        @keyframes abc{
            from{background-color: red;
            }
            50%{background-color: aqua;}
            75%{background-color: aqua;}
            to{background-color: blanchedalmond;}
        }

    </style>
</head>
<body>
    <div class="box">

    </div>
</body>
</html>

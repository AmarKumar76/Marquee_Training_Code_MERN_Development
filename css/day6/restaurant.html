<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        :root{
            --primary: white;
            --font-color:green;
        }
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container{
            background-color: rgb(209, 116, 174);
            width: 450px;
            height: 400px;
            border-radius: 10px;
            margin-left: 500px;
            margin-top: 150px;
        }
        .box1{
            width: 200px;
            height:350px;
            background-color: rgb(98, 98, 222);
            display: inline-block;
            margin: 10px;
            border-radius: 10px;
            color: var(--primary);
        }
        .box2{
            width: 200px;
            margin: 10px;
            display: inline-block;
            height:350px;
            border-radius: 10px;
            background-color: var(--primary)
        }
        .box2 h2{
            color:var(--font-color)
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="text-align: center;">A1 restaurant</h1>
        <div class="box1">
            <h2 style="text-align: center;">Veg</h2>
            <ul>
            <li style="margin: 3px; padding-left:30px">Veg Biryani with Raita: ₹230</li>
            <li>eera Rice: ₹120</li>
            </ul>
        </div>
        <div class="box2">
            <h2 style="text-align: center;">Non-Veg</h2>
        </div>
        <div class="box3"></div>
    </div>
    
</body>
</html>

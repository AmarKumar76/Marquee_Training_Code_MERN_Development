<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>z-index</title>
    <style>
        :root{
            --primary-color:red;
            --font-clor:white;
        }
        .box1{
            width: 200px;
            height: 200px;
            background-color: aqua;
            display: inline-block;
        }
        .box2{
            width: 200px;
            height: 200px;
            background-color: rgb(243, 159, 24);
            z-index: 5px;
            margin-left: 150px;
            color: var(--font-clor);
        }
        .box3{
            width: 200px;
            height: 200px;
            /*background-color: rgb(221, 11, 60);*/
            display: inline-block;
            position: absolute;
            z-index:70px;
            background-color: var(--primary-color);
        }
    </style>
</head>
<body>
    <div class="box1">box1</div>
    <div class="box2">box2</div>
    <div class="box3">box3</div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In css grid</title>
    <style>
            *{
                margin: 0;padding: 0;
                box-sizing: border-box;
            }
            .body{
                height: 100vh;
                width: 100vw;
            }
            .container{
                background-color: #3e3d3d;
                width: 100%;
                height: 100%;
                display: grid;
                padding: 2rem;
            }
            .item{
                background: rgb(94,57,57);
                border: 3px solid black;
            }
    </style>
</head>
<body>
    <div class="container">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item">4</div>
    </div>
</body>
</html>

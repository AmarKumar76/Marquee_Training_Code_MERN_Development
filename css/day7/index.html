<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexBOx</title>
    <style>
         .container{
        display: flex;
        flex-wrap: wrap; /*isko use krte hai box niche aa jayega jb box overflow hone lagega*/
        flex-direction: row;
        justify-content: center;
        align-items: center;
        width: auto;
        height: auto;
        background-color: black;
    }
    .box1,.box2,.box3,.box4{
        width: 200px;
        height: 200px;
        background-color: aqua;
        margin: 5px;;
        align-content: center;
        text-align: center;


    }
    .box3{
        order: 2;
    }
   
    </style>
</head>
<body>
    <div class="container">
        <div class="box1">box1</div>
        <div class="box2">box2</div>
        <div class="box3">box3</div>
        <div class="box4">box4</div>
        <div class="container">
    </div>
</body>
</html>
